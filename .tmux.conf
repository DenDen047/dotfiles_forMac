# ==================================
# 基本設定
# ==================================
# 設定ファイルのリロード
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# ==================================
# 表示設定
# ==================================
# 256色/True Color対応
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# ステータスバー
set -g status-position bottom
set -g status-style "bg=colour235,fg=colour136"
set -g status-left "#[fg=colour233,bg=colour245,bold] #S "
set -g status-right "#[fg=colour245] %Y-%m-%d %H:%M "
set -g status-left-length 20
set -g status-right-length 50

# ウィンドウステータス
setw -g window-status-current-style "fg=colour166,bg=colour238,bold"
setw -g window-status-current-format " #I:#W "
setw -g window-status-format " #I:#W "

# ペインボーダー
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour166"

# ==================================
# 操作設定
# ==================================
# マウスサポート
set -g mouse on

# ウィンドウ・ペイン番号を1から開始
set -g base-index 1
setw -g pane-base-index 1

# ウィンドウを閉じた際に番号を詰める
set -g renumber-windows on

# ペイン分割（直感的なキーバインド）
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# 新しいウィンドウをカレントディレクトリで開く
bind c new-window -c "#{pane_current_path}"

# ペイン移動（vim風）
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ペインリサイズ（vim風）
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ==================================
# コピーモード
# ==================================
# vi キーバインド
setw -g mode-keys vi

# コピーモードでの選択・コピー
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# ==================================
# その他
# ==================================
# エスケープキーの遅延をなくす（CLIツール向け）
set -sg escape-time 0

# ヒストリのバッファサイズ
set -g history-limit 50000

# アクティビティ通知
setw -g monitor-activity on
set -g visual-activity off

# ==================================
# URL を開く
# ==================================
# prefix + u でペイン内の URL を fzf で一覧表示→選択→ブラウザで開く
bind u run-shell -b "tmux capture-pane -J -p | grep -oE '(https?://|ftp://|www\\.)[a-zA-Z0-9./?=_%:#&~@!$+,;-]*' | sort -u | fzf-tmux -d 20 --multi --bind 'enter:become(open {+})'"
